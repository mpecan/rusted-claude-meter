name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Tauri system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libayatana-appindicator3-dev \
            librsvg2-dev libxdo-dev libssl-dev libgtk-3-dev

      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm

      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.96.0"
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2

      - name: Build frontend (required by tauri-build)
        run: |
          npm ci
          npm run build

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Check file sizes
        run: bash scripts/check-file-sizes.sh

      - name: Lint GitHub Actions workflows
        uses: reviewdog/action-actionlint@v1
        with:
          fail_level: error

      - name: Frontend typecheck (strict tsc)
        run: npx tsc --noEmit

      - name: Frontend tests (vitest)
        run: npm run test

  quality:
    name: Quality (licenses, advisories, duplication)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.96.0"

      - uses: Swatinem/rust-cache@v2
        with:
          cache-bin: true

      - uses: extractions/setup-just@v2

      # cargo-deny and cargo-dupes only read Cargo.lock/manifests and source
      # text respectively — no compilation, so no Tauri system deps needed.
      - name: cargo-deny check (licenses, advisories, bans, sources)
        uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check

      # Pinned to the version validated against the ratchet numbers below —
      # bump deliberately, alongside re-baselining `dupes_max_*` in justfile,
      # not as a side effect of a routine Cargo.lock/cache rotation.
      - name: Install cargo-dupes
        run: cargo install cargo-dupes --locked --version 0.2.1

      # Runs the same `dupes` recipe (and ratchet numbers) defined once in
      # justfile, so this can't silently drift from `just dupes`/the
      # pre-commit hook.
      - name: Duplication check
        run: just dupes

  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Tauri system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libayatana-appindicator3-dev \
            librsvg2-dev libxdo-dev libssl-dev libgtk-3-dev

      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm

      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.96.0"
          components: llvm-tools-preview

      - uses: Swatinem/rust-cache@v2

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov

      - uses: extractions/setup-just@v2

      - name: Build frontend (required by tauri-build)
        run: |
          npm ci
          npm run build

      # Runs the same `coverage` recipe (and ratchet floor) defined once in
      # justfile, so the numbers here can't silently drift from `just
      # coverage`. Ratcheting floor: these numbers must only ever go up (as
      # coverage improves). Never lower them to make a change pass — add
      # tests instead, or get explicit sign-off for an intentional decrease.
      - name: Coverage (ratchet-gated)
        run: |
          set +e
          just coverage > coverage.txt 2>&1
          status=$?
          {
            echo "## Coverage report"
            echo '```'
            cat coverage.txt
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
          cat coverage.txt
          exit $status

  test:
    name: Test (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6

      - name: Install Tauri system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libayatana-appindicator3-dev \
            librsvg2-dev libxdo-dev libssl-dev libgtk-3-dev

      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm

      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.96.0"
          components: clippy

      - uses: Swatinem/rust-cache@v2

      - name: Install nextest
        uses: taiki-e/install-action@nextest

      - name: Build frontend (required by tauri-build)
        run: |
          npm ci
          npm run build

      # The Lint job runs on Linux only, where all `target_os = "macos"`
      # code (popover, tray click handling) is cfg'd out — lint it here so
      # both platform surfaces are held to the same -D warnings gate.
      - name: Clippy (macOS cfg surface)
        if: runner.os == 'macOS'
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Run tests
        run: cargo nextest run --workspace
