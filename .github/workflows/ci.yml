name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

# Least privilege by default: CI executes third-party code (npm ci, the
# frontend build, vitest, and cargo builds of every dependency), so the
# ambient GITHUB_TOKEN must not be able to write to the repo. Jobs that need
# more (the lint job posts actionlint results as a check run) opt in
# explicitly at the job level. This blunts the Shai-Hulud playbook of using a
# writable CI token to plant malicious workflows / branches.
permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

# Third-party actions are pinned to a full commit SHA (with the human-readable
# tag in a trailing comment) so a hijacked tag/branch can't swap in malicious
# action code — Dependabot bumps the SHA and keeps the comment current.
jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    # Bounds every job well above a warm run but far below GitHub's 6h default,
    # so a hung step (a wedged install, a stuck test) is killed in minutes
    # instead of burning hours of Actions minutes.
    timeout-minutes: 20
    # Overrides the top-level read-only default: reviewdog's github-check
    # reporter (below) creates a check run to surface actionlint findings,
    # which needs checks: write. contents: read must be restated because
    # job-level permissions replace, not merge with, the workflow default.
    permissions:
      contents: read
      checks: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Install Tauri system dependencies
        uses: ./.github/actions/tauri-linux-deps

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7
        with:
          node-version: 24
          cache: npm

      - uses: dtolnay/rust-toolchain@2c7215f132e9ebf062739d9130488b56d53c060c # master
        with:
          toolchain: "1.96.0"
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2

      - name: Build frontend (required by tauri-build)
        run: |
          npm ci
          npm run build

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Check file sizes
        run: bash scripts/check-file-sizes.sh

      - name: Lint GitHub Actions workflows
        uses: reviewdog/action-actionlint@6fb7acc99f4a1008869fa8a0f09cfca740837d9d # v1
        with:
          fail_level: error
          # github-pr-check (the action's default reporter) requires an open
          # PR to attach annotations to; this job also runs on `push` to
          # main, where reviewdog would error with "this is not PullRequest
          # build". github-check works on both push and pull_request.
          reporter: github-check

      - name: Frontend typecheck (strict tsc)
        run: npx tsc --noEmit

      - name: Frontend tests (vitest)
        run: npm run test

  quality:
    name: Quality (licenses, advisories, duplication)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - uses: dtolnay/rust-toolchain@2c7215f132e9ebf062739d9130488b56d53c060c # master
        with:
          toolchain: "1.96.0"

      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          cache-bin: true

      - uses: extractions/setup-just@53165ef7e734c5c07cb06b3c8e7b647c5aa16db3 # v4

      # cargo-deny and cargo-dupes only read Cargo.lock/manifests and source
      # text respectively — no compilation, so no Tauri system deps needed.
      - name: cargo-deny check (licenses, advisories, bans, sources)
        uses: EmbarkStudios/cargo-deny-action@3c6349835b2b7b196a839186cb8b78e02f7b5f25 # v2
        with:
          command: check

      # Pinned to the version validated against the ratchet numbers below —
      # bump deliberately, alongside re-baselining `dupes_max_*` in justfile,
      # not as a side effect of a routine Cargo.lock/cache rotation.
      - name: Install cargo-dupes
        run: cargo install cargo-dupes --locked --version 0.2.1

      # Runs the same `dupes` recipe (and ratchet numbers) defined once in
      # justfile, so this can't silently drift from `just dupes`/the
      # pre-commit hook.
      - name: Duplication check
        run: just dupes

  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    # Higher ceiling: the instrumented llvm-cov build of the whole workspace is
    # the slowest job, especially on a cold cache.
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Install Tauri system dependencies
        uses: ./.github/actions/tauri-linux-deps

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7
        with:
          node-version: 24
          cache: npm

      - uses: dtolnay/rust-toolchain@2c7215f132e9ebf062739d9130488b56d53c060c # master
        with:
          toolchain: "1.96.0"
          components: llvm-tools-preview

      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@07b4745e0c39a41822af610387492e3e53aa222b # v2
        with:
          tool: cargo-llvm-cov

      - uses: extractions/setup-just@53165ef7e734c5c07cb06b3c8e7b647c5aa16db3 # v4

      - name: Build frontend (required by tauri-build)
        run: |
          npm ci
          npm run build

      # Runs the same `coverage` recipe (and ratchet floor) defined once in
      # justfile, so the numbers here can't silently drift from `just
      # coverage`. Ratcheting floor: these numbers must only ever go up (as
      # coverage improves). Never lower them to make a change pass — add
      # tests instead, or get explicit sign-off for an intentional decrease.
      - name: Coverage (ratchet-gated)
        run: |
          set +e
          just coverage > coverage.txt 2>&1
          status=$?
          {
            echo "## Coverage report"
            echo '```'
            cat coverage.txt
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
          cat coverage.txt
          exit $status

  test:
    name: Test (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        # macOS runners are intentionally dropped: the app is developed on
        # macOS, so the `target_os = "macos"` surface (popover, tray click
        # handling) is compiled, linted and tested by a local `just check` on
        # every change. Re-add `macos-latest` here to restore the macOS clippy
        # + test leg in CI — the `runner.os == 'macOS'` steps below are kept
        # parked for exactly that. (macOS runners also cost 10x the minutes.)
        os: [ubuntu-latest]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Install Tauri system dependencies
        if: runner.os == 'Linux'
        uses: ./.github/actions/tauri-linux-deps

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7
        with:
          node-version: 24
          cache: npm

      - uses: dtolnay/rust-toolchain@2c7215f132e9ebf062739d9130488b56d53c060c # master
        with:
          toolchain: "1.96.0"
          components: clippy

      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2

      - name: Install nextest
        uses: taiki-e/install-action@07b4745e0c39a41822af610387492e3e53aa222b # v2
        with:
          tool: nextest

      - name: Build frontend (required by tauri-build)
        run: |
          npm ci
          npm run build

      # The Lint job runs on Linux only, where all `target_os = "macos"`
      # code (popover, tray click handling) is cfg'd out — lint it here so
      # both platform surfaces are held to the same -D warnings gate.
      - name: Clippy (macOS cfg surface)
        if: runner.os == 'macOS'
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Run tests
        run: cargo nextest run --workspace
