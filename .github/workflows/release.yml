name: Release

# Builds signed/notarized macOS and Linux artifacts and publishes them to a
# GitHub Release whenever a `v*` tag is pushed — reproducible from the tag
# alone, no manual artifact handling (issue #14).
#
# macOS DMG signing + notarization only happens when the Apple secrets below
# are configured on the repo (Settings -> Secrets and variables -> Actions):
#   APPLE_CERTIFICATE            base64-encoded .p12 signing certificate
#   APPLE_CERTIFICATE_PASSWORD   password for the .p12 above
#   APPLE_SIGNING_IDENTITY       e.g. "Developer ID Application: Name (TEAMID)"
#   APPLE_ID                     Apple ID used for notarization
#   APPLE_PASSWORD                app-specific password for that Apple ID
#   APPLE_TEAM_ID                 10-character Apple Developer team ID
# Without them tauri-action still produces a working, unsigned DMG (Gatekeeper
# will warn on first launch) — the release is never blocked on secrets being
# present, only on the build itself succeeding.
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  # Renders the changelog for this tag from Conventional Commits (git-cliff,
  # see cliff.toml) and opens the release as a draft so the build jobs below
  # have somewhere to upload assets. Kept as a draft until `publish` below
  # runs, so nobody sees a release with only half the platforms attached.
  changelog:
    name: Draft release + changelog
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install git-cliff
        uses: taiki-e/install-action@v2
        with:
          tool: git-cliff

      - name: Render release notes from Conventional Commits
        run: git-cliff --tag "${{ github.ref_name }}" --unreleased --strip header -o release-notes.md

      - name: Create draft release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --repo "${{ github.repository }}" \
            --title "Rusted Claude Meter ${{ github.ref_name }}" \
            --notes-file release-notes.md \
            --draft

  build:
    name: Build (${{ matrix.platform }})
    needs: changelog
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
          # 22.04, not -latest: an AppImage/deb built here links against an
          # older glibc, so it stays installable on older distros too.
          - platform: ubuntu-22.04
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v6

      - name: Install Tauri system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libayatana-appindicator3-dev \
            librsvg2-dev libxdo-dev libssl-dev libgtk-3-dev

      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm

      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.96.0"

      - uses: Swatinem/rust-cache@v2

      - name: Install npm dependencies
        run: npm ci

      # Builds the bundle for the current OS (tauri.conf.json's
      # bundle.targets restricts this to app+dmg on macOS, deb+appimage on
      # Linux) and uploads it to the draft release created above — found by
      # tag, not created fresh, so both matrix legs land on the same release.
      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          tagName: ${{ github.ref_name }}
          releaseDraft: true
          prerelease: false

      - name: Render Homebrew cask (macOS only)
        if: runner.os == 'macOS'
        env:
          GH_TOKEN: ${{ github.token }}
        run: bash scripts/render-cask.sh "${{ github.ref_name }}"

      - name: Upload Homebrew cask asset (macOS only)
        if: runner.os == 'macOS'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${{ github.ref_name }}" rusted-claude-meter.rb \
            --repo "${{ github.repository }}" --clobber

  # Un-drafts the release once every platform has uploaded its artifacts, so
  # `Watch` / release-notification subscribers only see it once it's whole.
  publish:
    name: Publish release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release edit "${{ github.ref_name }}" \
            --repo "${{ github.repository }}" --draft=false
