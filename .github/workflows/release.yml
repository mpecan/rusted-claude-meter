name: Release

# Distinct build/sign/publish stage. Runs ONLY when a GitHub Release is
# published — release-please.yml cuts that release from the merged release PR;
# this never runs on a plain tag push. It builds the signed + notarized macOS
# DMG and the Linux AppImage/.deb for the release's tag and uploads them onto
# that same release (found by id, so nothing is created or re-drafted here).
#
# macOS signing + notarization only happen when the Apple secrets are set
# (Settings -> Secrets and variables -> Actions):
#   APPLE_CERTIFICATE            base64-encoded .p12 signing certificate
#   APPLE_CERTIFICATE_PASSWORD   password for the .p12 above
#   APPLE_SIGNING_IDENTITY       e.g. "Developer ID Application: Name (TEAMID)"
#   APPLE_ID                     Apple ID used for notarization
#   APPLE_PASSWORD               app-specific password for that Apple ID
#   APPLE_TEAM_ID                10-character Apple Developer team ID
# Without them tauri-action still uploads a working, unsigned DMG (Gatekeeper
# warns on first launch) — the build is never blocked on the secrets.
on:
  release:
    types: [published]
  # Manual re-build of an existing release (e.g. after adding the Apple
  # secrets, or a transient notarization failure). Point it at the tag.
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing release tag to (re)build, e.g. v0.1.0"
        required: true
        type: string

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  # The manual input on dispatch, otherwise the published release's tag. Kept
  # in env (not spliced into run: script text) so a tag name can't break out
  # of shell quoting.
  RELEASE_TAG: ${{ inputs.tag || github.event.release.tag_name }}

jobs:
  build:
    name: Build (${{ matrix.platform }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
          # 22.04, not -latest: an AppImage/deb built here links against an
          # older glibc, so it stays installable on older distros too.
          - platform: ubuntu-22.04
    runs-on: ${{ matrix.platform }}
    # The one legitimately long job: a full Tauri bundle plus, on macOS, Apple
    # notarization (whose notary service can take a while).
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          ref: ${{ env.RELEASE_TAG }}
          persist-credentials: false

      - name: Install Tauri system dependencies (Linux)
        if: runner.os == 'Linux'
        uses: ./.github/actions/tauri-linux-deps

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7
        with:
          node-version: 24
          cache: npm

      - uses: dtolnay/rust-toolchain@2c7215f132e9ebf062739d9130488b56d53c060c # master
        with:
          toolchain: "1.96.0"

      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2

      - name: Install npm dependencies
        run: npm ci

      # The release already exists (release-please published it); resolve its
      # numeric id so tauri-action uploads onto it instead of creating a new
      # one. Works for both the release event and manual dispatch.
      - name: Resolve release id
        id: release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ env.RELEASE_TAG }}
        run: |
          id=$(gh release view "$TAG" --repo "$GITHUB_REPOSITORY" --json databaseId --jq .databaseId)
          echo "id=$id" >> "$GITHUB_OUTPUT"

      - uses: tauri-apps/tauri-action@1deb371b0cd8bd54025b384f1cd735e725c4060f # v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          releaseId: ${{ steps.release.outputs.id }}

      - name: Render Homebrew cask (macOS only)
        if: runner.os == 'macOS'
        env:
          GH_TOKEN: ${{ github.token }}
        run: bash scripts/render-cask.sh "$RELEASE_TAG"

      - name: Upload Homebrew cask asset (macOS only)
        if: runner.os == 'macOS'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "$RELEASE_TAG" rusted-claude-meter.rb \
            --repo "${{ github.repository }}" --clobber
