name: Release

# Distinct build/sign/notarize/publish stage. Runs ONLY when a GitHub Release
# is published (release-please.yml cuts it) or via manual dispatch by tag.
#
# Split so the expensive 10x-cost macOS runner does the LEAST possible work:
#   * build-macos   — build + code-sign the .app/.dmg, then STOP. No Apple
#                     notarization round-trip here (that unbounded "notarytool
#                     --wait" is what used to idle the macOS runner). Uploads
#                     the signed DMG as a workflow artifact.
#   * notarize      — on a 1x-cost Linux runner, notarizes + staples that DMG
#                     with rcodesign (apple-codesign), which talks to Apple's
#                     notary API and staples without a Mac. The multi-minute
#                     (and variable) notary wait happens here, at 1x instead of
#                     the 10x it costs to idle a macOS runner.
#   * build-linux   — the Linux .deb/AppImage, straight to the release.
#
# Signing needs (macOS): APPLE_CERTIFICATE, APPLE_CERTIFICATE_PASSWORD,
# APPLE_SIGNING_IDENTITY.
# Notarization needs (Linux) an App Store Connect API key:
# APPLE_API_ISSUER_ID, APPLE_API_KEY_ID, APPLE_API_KEY_P8 (base64 of the .p8).
# Missing either set degrades gracefully: an unsigned / un-notarized DMG still
# ships (Gatekeeper warns) rather than blocking the release.
on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing release tag to (re)build, e.g. v0.1.1"
        required: true
        type: string

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  # Manual input on dispatch, otherwise the published release's tag. Kept in
  # env (not spliced into run: text) so a tag name can't break shell quoting.
  RELEASE_TAG: ${{ inputs.tag || github.event.release.tag_name }}

jobs:
  build-linux:
    name: Build Linux (.deb / AppImage)
    runs-on: ubuntu-22.04
    # 22.04, not -latest: an AppImage/deb built here links against an older
    # glibc, so it stays installable on older distros too.
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          ref: ${{ env.RELEASE_TAG }}
          persist-credentials: false

      - name: Install Tauri system dependencies (Linux)
        uses: ./.github/actions/tauri-linux-deps

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7
        with:
          node-version: 24
          cache: npm

      - uses: dtolnay/rust-toolchain@2c7215f132e9ebf062739d9130488b56d53c060c # master
        with:
          toolchain: "1.96.0"

      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          # Save the (on macOS, expensive) dependency compile cache even when a
          # later step fails, so a bad sign/upload never forces the next run
          # back to a cold ~10-minute compile.
          cache-on-failure: true

      - name: Install npm dependencies
        run: npm ci

      - name: Resolve release id
        id: release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ env.RELEASE_TAG }}
        run: echo "id=$(gh release view "$TAG" --repo "$GITHUB_REPOSITORY" --json databaseId --jq .databaseId)" >> "$GITHUB_OUTPUT"

      - uses: tauri-apps/tauri-action@1deb371b0cd8bd54025b384f1cd735e725c4060f # v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          releaseId: ${{ steps.release.outputs.id }}

  build-macos:
    name: Build + sign macOS (full + lite)
    runs-on: macos-latest
    # Two variants, but the dependency compile is shared, so the second is only
    # our own crates + a re-bundle.
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          ref: ${{ env.RELEASE_TAG }}
          persist-credentials: false

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7
        with:
          node-version: 24
          cache: npm

      - uses: dtolnay/rust-toolchain@2c7215f132e9ebf062739d9130488b56d53c060c # master
        with:
          toolchain: "1.96.0"

      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          # Save the (on macOS, expensive) dependency compile cache even when a
          # later step fails, so a bad sign/upload never forces the next run
          # back to a cold ~10-minute compile.
          cache-on-failure: true

      - name: Install npm dependencies
        run: npm ci

      # Build + code-sign the FULL variant. tauri-action imports the Developer
      # ID cert into a keychain and signs (hardened runtime, per
      # tauri.conf.json); it does NOT notarize — that runs on the Linux job. No
      # release inputs, so nothing is uploaded here; the DMGs leave as an
      # artifact.
      - uses: tauri-apps/tauri-action@1deb371b0cd8bd54025b384f1cd735e725c4060f # v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}

      # Stash the full DMG before the lite build, in case tauri's bundler
      # clears the dmg dir on the next build.
      - name: Stage the full DMG
        run: |
          set -euo pipefail
          mkdir -p dmgs
          find target/release/bundle/dmg -maxdepth 1 -name '*.dmg' -exec cp {} dmgs/ \;

      # Build + code-sign the LITE variant (browser import compiled out) through
      # tauri-action, so it imports the Developer ID cert into its own keychain
      # and signs exactly like the full build above. A raw `tauri build` here
      # can't see the identity the full step's keychain held (codesign fails
      # with "no identity found"), so signing is delegated to tauri-action too.
      # `tauri build` has no --no-default-features flag; the cargo feature arg
      # goes after a second `--` (the CLI forwards trailing args to cargo). A
      # distinct productName/identifier (tauri.lite.conf.json) gives it its own
      # .app/.dmg name so both variants coexist.
      - name: Build + sign — lite (no browser import)
        uses: tauri-apps/tauri-action@1deb371b0cd8bd54025b384f1cd735e725c4060f # v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
        with:
          args: --config src-tauri/tauri.lite.conf.json -- --no-default-features

      - name: Stage the lite DMG
        run: |
          set -euo pipefail
          find target/release/bundle/dmg -maxdepth 1 -name '*.dmg' -exec cp {} dmgs/ \;
          ls -la dmgs

      - name: Upload signed DMGs artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: macos-dmgs
          path: dmgs/*.dmg
          if-no-files-found: error
          retention-days: 1

  notarize:
    name: Notarize + staple + publish macOS (Linux)
    needs: build-macos
    runs-on: ubuntu-latest
    # The notary wait can be long and is variable — but it bills at 1x here,
    # not the 10x it would cost idling on the macOS runner.
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          ref: ${{ env.RELEASE_TAG }}
          persist-credentials: false

      # Land the DMGs where render-cask.sh looks for them.
      - name: Download signed DMGs
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: macos-dmgs
          path: target/release/bundle/dmg

      - name: Install rcodesign (apple-codesign)
        run: |
          url="https://github.com/indygreg/apple-platform-rs/releases/download/apple-codesign%2F0.29.0/apple-codesign-0.29.0-x86_64-unknown-linux-musl.tar.gz"
          curl -fsSL -o /tmp/rcodesign.tar.gz "$url"
          echo "dbe85cedd8ee4217b64e9a0e4c2aef92ab8bcaaa41f20bde99781ff02e600002  /tmp/rcodesign.tar.gz" | sha256sum -c -
          tar -xzf /tmp/rcodesign.tar.gz -C /tmp
          sudo install /tmp/apple-codesign-0.29.0-x86_64-unknown-linux-musl/rcodesign /usr/local/bin/rcodesign
          rcodesign --version

      # Notarize + staple BOTH DMGs (full + lite) against Apple's notary API,
      # from Linux, in parallel so the (variable) notary wait isn't doubled.
      # Stapling is in place, so the checksums the casks use are the notarized
      # artifacts'.
      - name: Notarize + staple
        env:
          APPLE_API_ISSUER_ID: ${{ secrets.APPLE_API_ISSUER_ID }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_KEY_P8: ${{ secrets.APPLE_API_KEY_P8 }}
        run: |
          set -euo pipefail
          shopt -s nullglob
          dmgs=(target/release/bundle/dmg/*.dmg)
          if [ ${#dmgs[@]} -eq 0 ]; then echo "no DMGs found" >&2; exit 1; fi
          if [ -z "${APPLE_API_KEY_P8:-}" ]; then
            echo "::warning::App Store Connect API key not set — skipping notarization"
            exit 0
          fi
          printf '%s' "$APPLE_API_KEY_P8" | base64 -d > AuthKey.p8
          trap 'rm -f AuthKey.p8 key.json' EXIT
          rcodesign encode-app-store-connect-api-key -o key.json \
            "$APPLE_API_ISSUER_ID" "$APPLE_API_KEY_ID" AuthKey.p8
          pids=()
          for dmg in "${dmgs[@]}"; do
            rcodesign notary-submit --api-key-file key.json --staple "$dmg" &
            pids+=("$!")
          done
          fail=0
          for pid in "${pids[@]}"; do
            wait "$pid" || fail=1
          done
          [ "$fail" -eq 0 ]

      - name: Upload notarized DMGs to the release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ env.RELEASE_TAG }}
        run: |
          set -euo pipefail
          shopt -s nullglob
          for dmg in target/release/bundle/dmg/*.dmg; do
            gh release upload "$TAG" "$dmg" --repo "${{ github.repository }}" --clobber
          done

      - name: Render Homebrew casks (full + lite)
        run: |
          set -euo pipefail
          bash scripts/render-cask.sh "$RELEASE_TAG" rusted-claude-meter "Rusted Claude Meter_*.dmg"
          bash scripts/render-cask.sh "$RELEASE_TAG" rusted-claude-meter-lite "Rusted Claude Meter Lite_*.dmg"

      - name: Upload casks to the release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ env.RELEASE_TAG }}
        run: |
          set -euo pipefail
          gh release upload "$TAG" rusted-claude-meter.rb rusted-claude-meter-lite.rb \
            --repo "${{ github.repository }}" --clobber

      # Publish both casks to the mpecan/homebrew-tools tap, so
      # `brew install --cask mpecan/tools/rusted-claude-meter[-lite]` works.
      # Uses the Repository Butler App token (already used by release-please)
      # scoped to the tap repo.
      - name: Generate GitHub App token (tap)
        id: tap-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3
        with:
          app-id: ${{ secrets.REPOSITORY_BUTLER_APP_ID }}
          private-key: ${{ secrets.REPOSITORY_BUTLER_PEM }}
          repositories: homebrew-tools

      - name: Check out the tap
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          repository: mpecan/homebrew-tools
          token: ${{ steps.tap-token.outputs.token }}
          path: homebrew-tools

      - name: Publish casks to the tap
        env:
          VERSION: ${{ env.RELEASE_TAG }}
        run: |
          set -euo pipefail
          mkdir -p homebrew-tools/Casks
          cp rusted-claude-meter.rb rusted-claude-meter-lite.rb homebrew-tools/Casks/
          cd homebrew-tools
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Casks/rusted-claude-meter.rb Casks/rusted-claude-meter-lite.rb
          if git diff --staged --quiet; then
            echo "casks unchanged — nothing to publish"
            exit 0
          fi
          git commit -m "chore: rusted-claude-meter ${VERSION#v}"
          git push
