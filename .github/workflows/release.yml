name: Release

# Builds signed/notarized macOS and Linux artifacts and publishes them to a
# GitHub Release whenever a `v*` tag is pushed — reproducible from the tag
# alone, no manual artifact handling (issue #14).
#
# macOS DMG signing + notarization only happens when the Apple secrets below
# are configured on the repo (Settings -> Secrets and variables -> Actions):
#   APPLE_CERTIFICATE            base64-encoded .p12 signing certificate
#   APPLE_CERTIFICATE_PASSWORD   password for the .p12 above
#   APPLE_SIGNING_IDENTITY       e.g. "Developer ID Application: Name (TEAMID)"
#   APPLE_ID                     Apple ID used for notarization
#   APPLE_PASSWORD                app-specific password for that Apple ID
#   APPLE_TEAM_ID                 10-character Apple Developer team ID
# Without them tauri-action still produces a working, unsigned DMG (Gatekeeper
# will warn on first launch) — the release is never blocked on secrets being
# present, only on the build itself succeeding.
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  # Renders the changelog for this tag from Conventional Commits (git-cliff,
  # see cliff.toml) and opens the release as a draft so the build jobs below
  # have somewhere to upload assets. Kept as a draft until `publish` below
  # runs, so nobody sees a release with only half the platforms attached.
  changelog:
    name: Draft release + changelog
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      # Passed through env (not spliced into run: script text) so a tag name
      # containing shell metacharacters can't break out of the quoting and
      # run arbitrary shell (tag names are attacker-controllable by anyone
      # who can push a v* tag).
      TAG: ${{ github.ref_name }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          # This job never pushes with git — gh/git-cliff use GH_TOKEN/the
          # env above explicitly — so don't leave the write-scoped
          # GITHUB_TOKEN sitting in .git/config for the whole job.
          persist-credentials: false

      - name: Install git-cliff
        uses: taiki-e/install-action@v2
        with:
          tool: git-cliff

      # --latest (not --unreleased): by the time this runs, actions/checkout
      # already sees the just-pushed tag pointing at HEAD, so "unreleased"
      # (commits not yet covered by any tag) is always empty. --latest
      # renders the range between the previous tag and this one instead.
      - name: Render release notes from Conventional Commits
        run: git-cliff --tag "$TAG" --latest --strip header -o release-notes.md

      - name: Create draft release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$TAG" \
            --repo "${{ github.repository }}" \
            --title "Rusted Claude Meter $TAG" \
            --notes-file release-notes.md \
            --draft

  build:
    name: Build (${{ matrix.platform }})
    needs: changelog
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
          # 22.04, not -latest: an AppImage/deb built here links against an
          # older glibc, so it stays installable on older distros too.
          - platform: ubuntu-22.04
    runs-on: ${{ matrix.platform }}
    # The one legitimately long job: a full Tauri bundle plus, on macOS, Apple
    # notarization (whose notary service can take a while). Generous ceiling so
    # a normal build+notarize never trips it, but a truly stuck build still
    # can't run for hours on a 10x-cost macOS runner.
    timeout-minutes: 45
    env:
      # See the identical comment in the changelog job: keep tag names out
      # of run: script text and use gh's own token env var instead of git's
      # persisted credentials.
      TAG: ${{ github.ref_name }}
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Install Tauri system dependencies (Linux)
        if: runner.os == 'Linux'
        uses: ./.github/actions/tauri-linux-deps

      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm

      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.96.0"

      - uses: Swatinem/rust-cache@v2

      - name: Install npm dependencies
        run: npm ci

      # Builds the bundle for the current OS (tauri.conf.json's
      # bundle.targets restricts this to app+dmg on macOS, deb+appimage on
      # Linux) and uploads it to the draft release created above — found by
      # tag, not created fresh, so both matrix legs land on the same release.
      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          tagName: ${{ github.ref_name }}
          releaseDraft: true
          prerelease: false

      - name: Render Homebrew cask (macOS only)
        if: runner.os == 'macOS'
        env:
          GH_TOKEN: ${{ github.token }}
        run: bash scripts/render-cask.sh "$TAG"

      - name: Upload Homebrew cask asset (macOS only)
        if: runner.os == 'macOS'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "$TAG" rusted-claude-meter.rb \
            --repo "${{ github.repository }}" --clobber

  # Un-drafts the release once every platform has uploaded its artifacts, so
  # `Watch` / release-notification subscribers only see it once it's whole.
  publish:
    name: Publish release
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      TAG: ${{ github.ref_name }}
    steps:
      - env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release edit "$TAG" \
            --repo "${{ github.repository }}" --draft=false
