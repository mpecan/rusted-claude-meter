name: Release

# Distinct build/sign/notarize/publish stage. Runs ONLY when a GitHub Release
# is published (release-please.yml cuts it) or via manual dispatch by tag.
#
# Split so the expensive 10x-cost macOS runner does the LEAST possible work:
#   * build-macos   — build + code-sign the .app/.dmg, then STOP. No Apple
#                     notarization round-trip here (that unbounded "notarytool
#                     --wait" is what used to idle the macOS runner). Uploads
#                     the signed DMG as a workflow artifact.
#   * notarize      — on a FREE Linux runner, notarizes + staples that DMG with
#                     rcodesign (apple-codesign), which talks to Apple's notary
#                     API and staples without a Mac. The multi-minute (and
#                     variable) notary wait happens here, on free minutes.
#   * build-linux   — the Linux .deb/AppImage, straight to the release.
#
# Signing needs (macOS): APPLE_CERTIFICATE, APPLE_CERTIFICATE_PASSWORD,
# APPLE_SIGNING_IDENTITY.
# Notarization needs (Linux) an App Store Connect API key:
# APPLE_API_ISSUER_ID, APPLE_API_KEY_ID, APPLE_API_KEY_P8 (base64 of the .p8).
# Missing either set degrades gracefully: an unsigned / un-notarized DMG still
# ships (Gatekeeper warns) rather than blocking the release.
on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing release tag to (re)build, e.g. v0.1.1"
        required: true
        type: string

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  # Manual input on dispatch, otherwise the published release's tag. Kept in
  # env (not spliced into run: text) so a tag name can't break shell quoting.
  RELEASE_TAG: ${{ inputs.tag || github.event.release.tag_name }}

jobs:
  build-linux:
    name: Build Linux (.deb / AppImage)
    runs-on: ubuntu-22.04
    # 22.04, not -latest: an AppImage/deb built here links against an older
    # glibc, so it stays installable on older distros too.
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          ref: ${{ env.RELEASE_TAG }}
          persist-credentials: false

      - name: Install Tauri system dependencies (Linux)
        uses: ./.github/actions/tauri-linux-deps

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7
        with:
          node-version: 24
          cache: npm

      - uses: dtolnay/rust-toolchain@2c7215f132e9ebf062739d9130488b56d53c060c # master
        with:
          toolchain: "1.96.0"

      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2

      - name: Install npm dependencies
        run: npm ci

      - name: Resolve release id
        id: release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ env.RELEASE_TAG }}
        run: echo "id=$(gh release view "$TAG" --repo "$GITHUB_REPOSITORY" --json databaseId --jq .databaseId)" >> "$GITHUB_OUTPUT"

      - uses: tauri-apps/tauri-action@1deb371b0cd8bd54025b384f1cd735e725c4060f # v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          releaseId: ${{ steps.release.outputs.id }}

  build-macos:
    name: Build + sign macOS (.dmg)
    runs-on: macos-latest
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          ref: ${{ env.RELEASE_TAG }}
          persist-credentials: false

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7
        with:
          node-version: 24
          cache: npm

      - uses: dtolnay/rust-toolchain@2c7215f132e9ebf062739d9130488b56d53c060c # master
        with:
          toolchain: "1.96.0"

      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2

      - name: Install npm dependencies
        run: npm ci

      # Build + code-sign only. Only the signing secrets are passed, so
      # tauri-action signs (hardened runtime, per tauri.conf.json) but does
      # NOT notarize — no notarytool --wait blocking this runner. No release
      # inputs, so nothing is uploaded here; the DMG leaves as an artifact.
      - uses: tauri-apps/tauri-action@1deb371b0cd8bd54025b384f1cd735e725c4060f # v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}

      - name: Upload signed DMG artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: macos-dmg
          path: target/release/bundle/dmg/*.dmg
          if-no-files-found: error
          retention-days: 1

  notarize:
    name: Notarize + staple + publish macOS (Linux)
    needs: build-macos
    runs-on: ubuntu-latest
    # The notary wait can be long and is variable — but it's on free minutes
    # here, not the 10x macOS runner.
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          ref: ${{ env.RELEASE_TAG }}
          persist-credentials: false

      # Land the DMG where render-cask.sh already looks for it.
      - name: Download signed DMG
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: macos-dmg
          path: target/release/bundle/dmg

      - name: Install rcodesign (apple-codesign)
        run: |
          url="https://github.com/indygreg/apple-platform-rs/releases/download/apple-codesign%2F0.29.0/apple-codesign-0.29.0-x86_64-unknown-linux-musl.tar.gz"
          curl -fsSL -o /tmp/rcodesign.tar.gz "$url"
          echo "dbe85cedd8ee4217b64e9a0e4c2aef92ab8bcaaa41f20bde99781ff02e600002  /tmp/rcodesign.tar.gz" | sha256sum -c -
          tar -xzf /tmp/rcodesign.tar.gz -C /tmp
          sudo install /tmp/apple-codesign-0.29.0-x86_64-unknown-linux-musl/rcodesign /usr/local/bin/rcodesign
          rcodesign --version

      # Notarize the DMG against Apple's notary API and staple the ticket to
      # it, all from Linux. Staples the DMG in place, so its checksum below is
      # the notarized artifact's.
      - name: Notarize + staple
        env:
          APPLE_API_ISSUER_ID: ${{ secrets.APPLE_API_ISSUER_ID }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_KEY_P8: ${{ secrets.APPLE_API_KEY_P8 }}
        run: |
          set -euo pipefail
          dmg=$(find target/release/bundle/dmg -maxdepth 1 -name '*.dmg' -print -quit)
          if [ -z "$dmg" ]; then echo "no DMG found" >&2; exit 1; fi
          if [ -z "${APPLE_API_KEY_P8:-}" ]; then
            echo "::warning::App Store Connect API key not set — skipping notarization (unsigned-quality DMG will ship)"
            exit 0
          fi
          printf '%s' "$APPLE_API_KEY_P8" | base64 -d > AuthKey.p8
          trap 'rm -f AuthKey.p8 key.json' EXIT
          rcodesign encode-app-store-connect-api-key -o key.json \
            "$APPLE_API_ISSUER_ID" "$APPLE_API_KEY_ID" AuthKey.p8
          rcodesign notary-submit --api-key-file key.json --staple "$dmg"

      - name: Upload notarized DMG to the release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ env.RELEASE_TAG }}
        run: |
          set -euo pipefail
          dmg=$(find target/release/bundle/dmg -maxdepth 1 -name '*.dmg' -print -quit)
          gh release upload "$TAG" "$dmg" --repo "${{ github.repository }}" --clobber

      - name: Render + upload Homebrew cask
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          bash scripts/render-cask.sh "$RELEASE_TAG"
          gh release upload "$RELEASE_TAG" rusted-claude-meter.rb \
            --repo "${{ github.repository }}" --clobber
