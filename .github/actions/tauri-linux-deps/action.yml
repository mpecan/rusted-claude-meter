name: Install Tauri Linux dependencies
description: >
  Installs the apt packages Tauri needs to build/lint/test the app on Linux
  (webkit2gtk, appindicator, rsvg, xdotool, openssl, gtk3). Single source of
  truth shared by ci.yml and release.yml so a dependency bump can't update
  one workflow without the other silently drifting.
runs:
  using: composite
  steps:
    - name: Install Tauri system dependencies
      shell: bash
      run: |
        sudo apt-get update
        sudo apt-get install -y libwebkit2gtk-4.1-dev libayatana-appindicator3-dev \
          librsvg2-dev libxdo-dev libssl-dev libgtk-3-dev
