<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="/src/styles.css" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Rusted Claude Meter</title>
    <script type="module" src="/src/main.ts" defer></script>
  </head>

  <body>
    <main class="popover">
      <header class="popover-header">
        <h1>Rusted Claude Meter</h1>
        <button id="refresh-button" class="ghost-button" type="button">Refresh</button>
      </header>

      <p id="status-line" class="status-line" data-banner="loading">Waiting for first update…</p>

      <section id="cards" class="cards" aria-live="polite"></section>

      <p id="empty-state" class="empty-state" hidden>No usage data yet.</p>

      <form id="session-form" class="session-form" hidden>
        <label for="session-input">Session key</label>
        <input
          id="session-input"
          name="session"
          type="password"
          autocomplete="off"
          spellcheck="false"
          placeholder="sk-ant-… or the sessionKey cookie value"
        />
        <button type="submit">Save</button>
        <p id="session-error" class="session-error" role="alert" hidden></p>
      </form>
    </main>
  </body>
</html>
